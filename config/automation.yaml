# Spark autonomous orchestration config.

output_dir: automation
research_dir: research
research_config: config/research.yaml

safety:
  auto_enable_production: false
  candidate_only: true
  allow_python_strategy_generation: false
  send_trade_alerts_only: true

schedule:
  timezone: Asia/Shanghai
  openclaw_cron:
    daily_signal: "15 9 * * 1-5 cd /home/zhangtongzhe/Codework/Spark_automation && venv/bin/python -m automation.orchestrator daily"
    daily_research: "30 16 * * 1-5 cd /home/zhangtongzhe/Codework/Spark_automation && venv/bin/python -m automation.orchestrator research"
    weekly_experiment: "0 10 * * 6 cd /home/zhangtongzhe/Codework/Spark_automation && venv/bin/python -m automation.orchestrator weekly"
    health_check: "0 8 * * 1-5 cd /home/zhangtongzhe/Codework/Spark_automation && venv/bin/python -m automation.orchestrator health"

experiments:
  test_window:
    start_date:
    end_date:
  acceptance:
    min_trades: 20
    min_sharpe: 0.8
    max_drawdown: 0.25
    min_win_rate: 0.5
    min_profit_factor: 1.05
    min_sharpe_improvement: 0.0

legacy_evolution:
  # Runs the existing evolution.engine weekly check. It writes evolution state only
  # and does not auto-enable research candidates.
  enabled: true

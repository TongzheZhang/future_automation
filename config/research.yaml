# Spark futures research pipeline configuration

output_dir: research
cache_dir: cache
ideas_dir: ideas
reports_dir: reports

schedule:
  suggested_frequency: daily
  timezone: Asia/Shanghai

max_articles_per_run: 20
max_ideas_per_run: 6
min_sources_per_idea: 1
request_timeout_seconds: 12
rate_limit_seconds: 0.8
user_agent: "SparkResearchBot/0.1 (+local strategy research; no trading execution)"

llm:
  enabled: true
  provider: ollama
  base_url: "http://127.0.0.1:11434"
  model: "qwen2.5:7b"
  timeout_seconds: 45
  temperature: 0.2

query_templates:
  - "{name} {symbol} 期货 库存 开工率 基差"
  - "{name} {symbol} 期货 政策 供需 价格"
  - "中国 商品期货 宏观 库存 工业品 农产品"
  - "商品期货 外盘 隔夜 波动 开盘缺口"

max_queries_per_run: 8

sources:
  search:
    enabled: true
    name: duckduckgo_html
    base_url: "https://duckduckgo.com/"
    url_template: "https://duckduckgo.com/html/?q={query}"

  # These are intentionally conservative pages. Source failures are logged and skipped.
  web_pages:
    - name: 上海期货交易所公告
      url: "https://www.shfe.com.cn/news/notice/"
    - name: 大连商品交易所公告
      url: "https://www.dce.com.cn/dalianshangpin/ywfw/jystz/ywtz/index.html"
    - name: 郑州商品交易所公告
      url: "http://www.czce.com.cn/cn/jysdt/ggytz/H770301index_1.htm"
    - name: 国家统计局
      url: "https://www.stats.gov.cn/sj/zxfb/"

  rss_feeds: []
